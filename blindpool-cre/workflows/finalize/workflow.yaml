# Input: auctionId. Loads sealed bids from store; computes clearing price;
# calls BlindPoolCCA.forwardBidsToCCA(...) (admin). See plan_execution.md.
# ==========================================================================

staging-settings:
  user-workflow:
    workflow-name: "blindpool-finalize-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../../secrets.yaml"

production-settings:
  user-workflow:
    workflow-name: "blindpool-finalize-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../../secrets.yaml"

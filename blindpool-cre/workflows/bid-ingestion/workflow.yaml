# ==========================================================================
# Bid Ingestion Workflow — POST /cre/bid
# ==========================================================================
# Accepts EIP-712 signed SilentBid bid; verifies signature; computes commitment;
# optionally calls compliance API via Confidential HTTP; returns commitment for
# frontend to call BlindPoolCCA.submitBlindBid(commitment) or workflow submits.
# ==========================================================================

staging-settings:
  user-workflow:
    workflow-name: "blindpool-bid-ingestion-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../../secrets.yaml"

production-settings:
  user-workflow:
    workflow-name: "blindpool-bid-ingestion-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../../secrets.yaml"
